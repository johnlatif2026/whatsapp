<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab {
    flex: 1;
    padding: 10px;
    background: #1f2937;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 10px;
}

.tab.active {
    background: #22c55e;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

input, select {
    background: #1f2937;
    color: white;
}

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}

.hidden { display: none; }

.small { font-size: 12px; opacity: 0.7; }
</style>
</head>

<body>

<div class="container">

<h2>📊 WhatsApp Dashboard</h2>

<div class="tabs">
    <button class="tab active" onclick="showTab('add')">➕ إضافة</button>
    <button class="tab" onclick="showTab('people')">👥 الأشخاص</button>
    <button class="tab" onclick="showTab('send')">🚀 إرسال</button>
    <button class="tab" onclick="showTab('logs')">📜 السجل</button>
</div>

<!-- ADD -->
<div id="add">
    <div class="card">
        <input id="name" placeholder="الاسم">
        <input id="phone" placeholder="الرقم (2010...)">
        <select id="gender">
            <option value="male">ولد</option>
            <option value="female">بنت</option>
        </select>
        <button onclick="addPerson()">إضافة</button>
    </div>
</div>

<!-- PEOPLE -->
<div id="people" class="hidden"></div>

<!-- SEND -->
<div id="send" class="hidden">
    <div class="card">
        <button onclick="sendAll()">🚀 إرسال للجميع</button>
    </div>
</div>

<!-- LOGS -->
<div id="logs" class="hidden"></div>

</div>

<script>

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    document.querySelectorAll('#add,#people,#send,#logs')
    .forEach(el => el.classList.add('hidden'));

    document.getElementById(tab).classList.remove('hidden');

    if(tab === "people") loadPeople();
    if(tab === "logs") loadLogs();
}

async function addPerson() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const gender = document.getElementById("gender").value;

    await fetch('/api/add', {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name, phone, gender})
    });

    alert("تمت الإضافة");

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
}

async function loadPeople() {
    const res = await fetch('/api/people');
    const data = await res.json();

    const box = document.getElementById("people");
    box.innerHTML = "";

    data.forEach(p => {
        box.innerHTML += `
        <div class="card">
            <div>${p.name}</div>
            <div class="small">${p.phone}</div>
            <div>${p.gender}</div>
        </div>`;
    });
}

async function sendAll() {
    const res = await fetch('/api/send-all', { method: "POST" });
    const data = await res.json();

    data.urls.forEach(url => {
        window.open(url, "_blank");
    });
}

async function loadLogs() {
    const res = await fetch('/api/messages');
    const data = await res.json();

    const box = document.getElementById("logs");
    box.innerHTML = "";

    data.forEach(m => {
        box.innerHTML += `
        <div class="card">
            <div><b>${m.name}</b></div>
            <div class="small">${m.phone}</div>
            <div class="small">${m.message}</div>
            <div>status: ${m.status}</div>
        </div>`;
    });
}

</script>

</body>
</html>
