<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk WhatsApp Sender</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

input, select {
    background: #1f2937;
    color: white;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.tab {
    flex: 1;
    padding: 10px;
    background: #1f2937;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

.hidden { display: none; }

.progress {
    height: 10px;
    background: #1f2937;
    border-radius: 10px;
    margin-top: 10px;
}

.bar {
    height: 10px;
    width: 0%;
    background: #22c55e;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Bulk WhatsApp Sender</h2>

<div class="tabs">
    <button class="tab" onclick="show('add')">➕ إضافة</button>
    <button class="tab" onclick="show('send')">📤 إرسال</button>
    <button class="tab" onclick="show('people')">👥 الأشخاص</button>
</div>

<!-- ADD -->
<div id="add">
    <div class="card">
        <input id="name" placeholder="الاسم">
        <input id="phone" placeholder="الرقم">
        <select id="gender">
            <option value="male">ولد</option>
            <option value="female">بنت</option>
        </select>
        <button onclick="add()">إضافة</button>
    </div>
</div>

<!-- SEND -->
<div id="send" class="hidden">
    <div class="card">
        <button onclick="sendAll()">🚀 إرسال جماعي</button>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>
    </div>
</div>

<!-- PEOPLE -->
<div id="people" class="hidden"></div>

</div>

<script>

function show(id) {
    document.querySelectorAll('#add,#send,#people')
    .forEach(e => e.classList.add('hidden'));

    document.getElementById(id).classList.remove('hidden');

    if(id === "people") loadPeople();
}

/* ================= ADD ================= */

async function add() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const gender = document.getElementById("gender").value;

    await fetch('/api/add', {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name, phone, gender})
    });

    alert("تمت الإضافة");
}

/* ================= PEOPLE ================= */

async function loadPeople() {
    const res = await fetch('/api/people');
    const data = await res.json();

    const box = document.getElementById("people");
    box.innerHTML = "";

    data.forEach(p => {
        box.innerHTML += `
        <div class="card">
            ${p.name} - ${p.phone}
        </div>`;
    });
}

/* ================= BULK SEND ================= */

async function sendAll() {
    const res = await fetch('/api/send-all', { method: "POST" });
    const data = await res.json();

    const urls = data.urls;

    let progress = 0;
    const bar = document.getElementById("bar");

    function openBatch(i = 0) {
        const batch = urls.slice(i, i + 5);

        batch.forEach(url => window.open(url, "_blank"));

        progress = (i / urls.length) * 100;
        bar.style.width = progress + "%";

        if (i < urls.length) {
            setTimeout(() => openBatch(i + 5), 700);
        } else {
            bar.style.width = "100%";
        }
    }

    openBatch();
}

</script>

</body>
</html>
