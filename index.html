<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إرسال جماعي واتساب</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            direction: rtl;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        textarea, input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #25D366;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>إرسال جماعي واتساب</h3>

    <input type="text" id="name" placeholder="الاسم">

    <textarea id="phones" placeholder="اكتب الأرقام (كل رقم في سطر)&#10;2010xxxxxxx&#10;2011xxxxxxx"></textarea>

    <select id="gender">
        <option value="male">ولد</option>
        <option value="female">بنت</option>
    </select>

    <button onclick="sendBulk()">إرسال جماعي</button>
</div>

<script>
async function sendBulk() {
    const name = document.getElementById("name").value;
    const phonesText = document.getElementById("phones").value;
    const gender = document.getElementById("gender").value;

    const phones = phonesText.split('\n').map(p => p.trim()).filter(p => p);

    const res = await fetch('/api/send-bulk', {
        method: 'POST',
        headers: {
    "Content-Type": "application/json"
},
body: JSON.stringify({
    name,
    phones,
    gender
})
    const data = await res.json();

    if (data.urls) {
        data.urls.forEach(url => {
            window.open(url, '_blank');
        });
    }
}
</script>

</body>
</html>
