<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إرسال رسالة واتساب</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            direction: rtl;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #25D366;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1ebe5d;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>إرسال رسالة واتساب</h2>

    <input type="text" id="name" placeholder="الاسم">
    <input type="text" id="phone" placeholder="رقم الواتساب (2010...)">

    <select id="gender">
        <option value="male">ولد</option>
        <option value="female">بنت</option>
    </select>

    <button onclick="sendMessage()">إرسال</button>
</div>

<script>
    async function sendMessage() {
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const gender = document.getElementById("gender").value;

        const response = await fetch('/api/send', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ name, phone, gender })
        });

        const data = await response.json();

        if (data.url) {
            window.open(data.url, '_blank');
        } else {
            alert("حدث خطأ");
        }
    }
</script>

</body>
</html>
