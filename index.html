<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إرسال واتساب جماعي</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            direction: rtl;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, textarea, select, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }

        button {
            background: #25D366;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1ebe5d;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>إرسال واتساب جماعي</h3>

    <input type="text" id="name" placeholder="الاسم">

    <textarea id="phones" placeholder="اكتب الأرقام كل رقم في سطر
2010xxxxxxx
2011xxxxxxx"></textarea>

    <select id="gender">
        <option value="male">ولد</option>
        <option value="female">بنت</option>
    </select>

    <button onclick="send()">إرسال</button>
</div>

<script>
async function send() {
    const name = document.getElementById("name").value;
    const phonesText = document.getElementById("phones").value;
    const gender = document.getElementById("gender").value;

    const phones = phonesText
        .split("\n")
        .map(p => p.trim())
        .filter(p => p);

    const res = await fetch('/api/send-bulk', {
        method: 'POST',
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            phones,
            gender
        })
    });

    const data = await res.json();

    if (data.urls) {
        data.urls.forEach(url => {
            window.open(url, "_blank");
        });
    } else {
        alert("حصل خطأ");
    }
}
</script>

</body>
</html>
